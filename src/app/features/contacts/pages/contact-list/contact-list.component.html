<div class="max-w-7xl mx-auto p-4 sm:p-6">
  <div class="bg-white rounded-xl shadow-md border border-slate-200 p-5">
    <div
      class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between"
    >
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Contacts</h2>
        <p class="text-sm text-slate-500">Manage your contact list</p>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
        <app-input
          placeholder="Search by name..."
          [(ngModel)]="searchText"
          (ngModelChange)="search()"
          widthClass="w-full sm:w-72 border-none"
        >
        </app-input>

        <app-button class="my-3" (click)="navigate()"> + Add Contact </app-button>
      </div>
    </div>
  </div>

  <div
    class="mt-6 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden"
  >
    <div class="overflow-x-auto">
      <app-table
        [columns]="tableColumns"
        [data]="pagedData"
        (edit)="editContact($event)"
        (delete)="delete($event)"
      >
      </app-table>

      <app-paginator
        [length]="filtered.length"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5]"
        [showFirstLastButtons]="true"
        (pageChange)="pageChanged($event)"
      >
      </app-paginator>
    </div>
  </div>
</div>
