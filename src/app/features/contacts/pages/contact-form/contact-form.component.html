<div class="max-w-3xl mx-auto p-4 sm:p-6">
  <div class="bg-white border border-slate-200 rounded-xl shadow-md">

    <div class="border-b border-slate-200 px-6 py-4">
      <h2 class="text-2xl font-bold text-slate-800">
        {{ editId ? "Edit Contact" : "Add Contact" }}
      </h2>

      <p class="text-sm text-slate-500 mt-1">
        Fill in the details below and save the contact.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="p-6 space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <app-input
          label="First Name"
          placeholder="Enter first name"
          formControlName="first_name"
               [control]="form.get('first_name')"
                 [required]="true"
        >
        </app-input>

        <app-input
          label="Last Name"
          placeholder="Enter last name"
          formControlName="last_name"
             [control]="form.get('last_name')"
               [required]="true"
        >
        </app-input>

        <app-input
          type="email"
          label="Email Address"
          placeholder="Enter email"
          formControlName="emailId"
                 [control]="form.get('emailId')"
                   [required]="true"
        >
        </app-input>

        <app-input
          label="Mobile Number"
          placeholder="Enter mobile number"
          formControlName="mobilenumber"
          [control]="form.get('mobilenumber')"
            [required]="true"
        >
        </app-input>

        <app-input
          type="number"
          label="Age"
          placeholder="Enter age"
          formControlName="age"
        >
        </app-input>

        <app-select
          label="Gender"
          formControlName="gender"
          [options]="genderOptions"
            [required]="true"
              [control]="form.get('gender')"
          
        >
        </app-select>

        <app-input
          label="PAN Number"
          placeholder="ABCDE1234F"
          formControlName="pan_no"
             [control]="form.get('pan_no')"
               [required]="true"
        >
        </app-input>

        <app-input
          label="Aadhaar Number"
          placeholder="12 digit Aadhaar"
          formControlName="adhaar_no"
            [control]="form.get('adhaar_no')"
              [required]="true"
          
        >
        </app-input>
      </div>

      <div class="flex justify-end gap-3 pt-4">
        <app-button type="button" routerLink="/contacts" variant="secondary">
          Cancel
        </app-button>

        <app-button type="submit" [disabled]="form.invalid">
          {{ editId ? "Update Contact" : "Save Contact" }}
        </app-button>
      </div>
    </form>
  </div>
</div>
