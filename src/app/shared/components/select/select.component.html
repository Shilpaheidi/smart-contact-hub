<div>
  <label class="block text-sm font-medium text-slate-700 mb-2">
    {{ label }}
    <span *ngIf="required" class="text-red-500">*</span>
  </label>

  <select
    [value]="value"
    (change)="change($event)"
    (blur)="onBlur()"
    class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500"
  >
    <option value="">{{ placeholder }}</option>

    <option *ngFor="let option of options" [value]="option.value">
      {{ option.label }}
    </option>
  </select>

  <p
    class="text-red-500 text-xs mt-1"
    *ngIf="control?.touched && control?.invalid"
  >
    <span *ngIf="control?.errors?.['required']">
      {{ label }} is required
    </span>
  </p>
</div>
