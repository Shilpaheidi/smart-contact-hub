<div>
  <label class="block text-sm font-medium text-slate-700 mb-2">
    {{ label }}
    <span *ngIf="required" class="text-red-500">*</span>
  </label>

  <input
    [type]="type"
    [value]="value"
    [placeholder]="placeholder"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500"
  />

  <p
    class="text-red-500 text-xs mt-1"
    *ngIf="control?.touched && control?.invalid"
  >
    <span *ngIf="control?.errors?.['required']"> {{ label }} is required </span>

    <span *ngIf="control?.errors?.['email']"> Invalid email format </span>

    <span *ngIf="control?.errors?.['minlength']"> Minimum length not met </span>

    <span *ngIf="control?.errors?.['pattern']"> Invalid format </span>
  </p>
</div>
